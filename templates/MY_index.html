<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambulance AI Dashboard</title>
    <style>
        /* Zamonaviy dizayn uslubi */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 90%; max-width: 400px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; }
        .chat-header { background: #007bff; color: white; padding: 20px; text-align: center; font-size: 1.2em; font-weight: bold; }
        
        /* Chat oynasi dizayni */
        #chat-box { height: 450px; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #ffffff; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 14px; line-height: 1.4; }
        .user-msg { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
        .bot-msg { align-self: flex-start; background: #e9ecef; color: #333; border-bottom-left-radius: 2px; }

        /* Kirish qismi */
        .input-area { display: flex; padding: 15px; border-top: 1px solid #eee; background: #f9f9f9; }
        input { flex: 1; border: 1px solid #ddd; padding: 12px; border-radius: 25px; outline: none; transition: 0.3s; }
        input:focus { border-color: #007bff; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; margin-left: 10px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">🚑 Ambulance AI Helper</div>
    <div id="chat-box">
        <div class="message bot-msg">Salom! Men sizga qanday yordam bera olaman?</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Xabarni yozing..." onkeypress="handleKey(event)">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
    // Enter tugmasini bossa ham yuboradigan qilish
    function handleKey(e) {
        if (e.keyCode === 13) sendMessage();
    }

    async function sendMessage() {
        let input = document.getElementById("user-input");
        let chatBox = document.getElementById("chat-box");
        let message = input.value.trim();

        if (message === "") return;

        // Foydalanuvchi xabarini qo'shish
        chatBox.innerHTML += `<div class="message user-msg">${message}</div>`;
        input.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            let response = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: message})
            });
            let data = await response.json();
            
            // Robot javobini qo'shish
            chatBox.innerHTML += `<div class="message bot-msg">${data.reply}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (error) {
            chatBox.innerHTML += `<div class="message bot-msg" style="color:red;">Xatolik: Serverga ulanib bo'lmadi.</div>`;
        }
    }
</script>

</body>
</html>
