<!DOCTYPE html>
<html>
<head>
    <title>Ambulance AI</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; text-align: center; }
        #chat-box { width: 300px; height: 400px; border: 1px solid #ccc; margin: 20px auto; background: white; padding: 10px; overflow-y: scroll; }
    </style>
</head>
<body>
    <h1>Ambulance AI Dashboard</h1>
    <div id="chat-box"></div>
    <input type="text" id="user-input" placeholder="Xabar yozing...">
    <button onclick="sendMessage()">Yuborish</button>

    <script>
        async function sendMessage() {
            let input = document.getElementById("user-input");
            let chatBox = document.getElementById("chat-box");

            chatBox.innerHTML += "<b>Siz:</b> " + input.value + "<br>";

            let response = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: input.value})
            });
            let data = await response.json();
            chatBox.innerHTML += "<b>Robot:</b> " + data.reply + "<br><br>";
            input.value = "";
        }
    </script>
</body>
</html>
