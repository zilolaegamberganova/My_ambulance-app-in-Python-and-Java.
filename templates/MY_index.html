<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>AI Ko'p Tilli Yordamchi</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; margin-top: 50px; background: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; background: #eee; }
        button:hover { background: #ddd; }
        input { padding: 10px; width: 250px; border-radius: 5px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="title">Xush kelibsiz!</h1>
    
    <div style="margin-bottom: 20px;">
        <button onclick="changeLang('uz')">O'zbek</button>
        <button onclick="changeLang('en')">English</button>
        <button onclick="changeLang('ru')">Русский</button>
    </div>

    <input type="text" id="userInput" placeholder="Savol yozing...">
    <button onclick="sendToAI()" id="sendBtn">Yuborish</button>

    <div style="margin-top: 20px;">
        <strong>AI:</strong> <span id="aiStatus">...</span>
        <p id="responseArea" style="color: darkblue; font-weight: bold;"></p>
    </div>
</div>

<script>
    // 1. Tillar lug'ati
    const dictionary = {
        uz: { title: "Xush kelibsiz!", placeholder: "Savol yozing...", btn: "Yuborish", loading: "O'ylamoqda..." },
        en: { title: "Welcome!", placeholder: "Ask a question...", btn: "Send", loading: "Thinking..." },
        ru: { title: "Добро пожаловать!", placeholder: "Задайте вопрос...", btn: "Отправить", loading: "Думает..." }
    };

    let selectedLang = 'uz';

    // 2. Tilni o'zgartirish funksiyasi
    function changeLang(lang) {
        selectedLang = lang;
        document.getElementById('title').innerText = dictionary[lang].title;
        document.getElementById('userInput').placeholder = dictionary[lang].placeholder;
        document.getElementById('sendBtn').innerText = dictionary[lang].btn;
    }

    // 3. AI bilan bog'lanish va Ovoz
    async function sendToAI() {
        const text = document.getElementById('userInput').value;
        const status = document.getElementById('aiStatus');
        const responseArea = document.getElementById('responseArea');

        status.innerText = dictionary[selectedLang].loading;

        const res = await fetch('/ask_ai', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, lang: selectedLang })
        });

        const data = await res.json();
        status.innerText = "OK";
        responseArea.innerText = data.reply;

        // Ovoz chiqarish
        const speech = new SpeechSynthesisUtterance(data.reply);
        speech.lang = selectedLang === 'uz' ? 'tr-TR' : (selectedLang === 'en' ? 'en-US' : 'ru-RU');
        window.speechSynthesis.speak(speech);
    }
</script>

</body>
</html>
