<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>AI Ovozli Yordamchi</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        input { width: 80%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px; }
        button { background: #4F46E5; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #javob { margin-top: 20px; color: #1E293B; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🤖 AI Assistant</h2>
        <input type="text" id="savol" placeholder="Savolingizni yozing...">
        <button onclick="yubor()">➤ So'rash</button>
        <p id="javob">Javobni kuting...</p>
    </div>

    <script>
    async function yubor() {
        let msg = document.getElementById("savol").value;
        if(!msg) return;

        // Python (app.py) bilan bog'lanish
        let res = await fetch('/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: msg})
        });
        let data = await res.json();
        document.getElementById("javob").innerText = data.reply;

        // OVOZLI GAPIRTIRISH (Eng muhimi!)
        let ovoz = new SpeechSynthesisUtterance(data.reply);
        ovoz.lang = 'uz-UZ'; // O'zbek tili (yoki ru-RU)
        window.speechSynthesis.speak(ovoz);
    }
    </script>
</body>
</html>
